# ============================================================
# Bansari Commerce Pro — CI Build & Type Check
# ============================================================
#
# Triggers: push and pull_request on every branch.
# Fails immediately if any step exits non-zero.
#
# Required repository secrets (Settings → Secrets → Actions):
#   NEXT_PUBLIC_SUPABASE_URL       — https://pgpirjzgrvrfbxnampoa.supabase.co
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  — eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBncGlyanpncnZyZmJ4bmFtcG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5Mjk4ODksImV4cCI6MjA5ODUwNTg4OX0.6iJxAMAUSiaUXtu6VOCg9NSgAexP1n902kft8IM6kL4
#   SUPABASE_SERVICE_ROLE_KEY      — eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBncGlyanpncnZyZmJ4bmFtcG9hIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjkyOTg4OSwiZXhwIjoyMDk4NTA1ODg5fQ.g0jZ2i7Fn7vxvQ0xKwtn5-a4hZ8w2igCVKfAk5xyPp8
#
# Optional secrets (workflow still passes without them,
# but the running app will behave incorrectly at runtime):
#   NEXTAUTH_SECRET
#   NEXTAUTH_URL
#
# The workflow does NOT inject placeholder values.
# If a required secret is missing the env-guard step aborts
# the run with a clear error message before any build starts.
# ============================================================

name: Build & Type Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# ── Concurrency ────────────────────────────────────────────────
# One run per branch at a time.
# A new push cancels any in-progress run on the same ref so
# runners are never wasted on superseded commits.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # All commands execute inside the Next.js sub-directory.
    working-directory: bansari-commerce-pro

jobs:
  build:
    name: Next.js build + tsc --noEmit
    runs-on: ubuntu-latest

    # ── Hard wall-clock limit ──────────────────────────────────
    # Kills the job if it runs longer than 15 minutes.
    # Prevents runaway Turbopack workers from burning quota.
    timeout-minutes: 15

    # ── Node version ───────────────────────────────────────────
    # No .nvmrc and no engines field in package.json.
    # Node 22 is the current Active LTS.
    strategy:
      matrix:
        node-version: ['22']

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node ────────────────────────────────────────
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: bansari-commerce-pro/package-lock.json

      # ── 3. Guard: fail immediately if required secrets absent ─
      #
      # Placeholder values produce builds that compile but silently
      # misbehave at runtime and mask real configuration errors.
      # This step aborts with a descriptive error message before
      # any npm install or build work is attempted.
      - name: Verify required environment secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]      && missing+=("NEXT_PUBLIC_SUPABASE_URL")
          [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && missing+=("NEXT_PUBLIC_SUPABASE_ANON_KEY")
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]     && missing+=("SUPABASE_SERVICE_ROLE_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required secrets are not configured in this repository."
            echo "::error::Missing: ${missing[*]}"
            echo ""
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✓ All required secrets are present."

      # ── 4. Install dependencies ──────────────────────────────
      - name: Install dependencies (npm ci)
        run: npm ci

      # ── 5. Print installed versions ──────────────────────────
      - name: Print installed package versions
        run: |
          echo "========================================="
          echo "Node       : $(node --version)"
          echo "npm        : $(npm --version)"
          echo "Next.js    : $(node -e "console.log(require('./node_modules/next/package.json').version)")"
          echo "TypeScript : $(node -e "console.log(require('./node_modules/typescript/package.json').version)")"
          echo "========================================="

      # ── 6. Lint ──────────────────────────────────────────────
      #
      # NON-BLOCKING — lint findings are reported in the log but
      # do NOT fail the CI run. Build and type-check remain the
      # mandatory gates. Lint will become a hard gate in a
      # dedicated code-quality sprint once all Sprint 13 findings
      # are resolved.
      #
      # To re-enable as a hard gate: remove continue-on-error.
      - name: Lint (npm run lint) [non-blocking]
        continue-on-error: true
        run: |
          if jq -e '.scripts.lint' package.json > /dev/null 2>&1; then
            echo "✓ lint script found — running npm run lint"
            npm run lint
          else
            echo "⚠ No lint script in package.json — skipping."
          fi

      # ── 7. Build ─────────────────────────────────────────────
      #
      # NEXT_TELEMETRY_DISABLED=1  suppresses telemetry pings.
      # CI=true                    makes Next.js treat warnings
      #                            as errors (stricter gate).
      - name: Build (npm run build)
        env:
          CI: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: npm run build

      # ── 8. TypeScript type check ─────────────────────────────
      #
      # Runs after build so Turbopack's incremental cache is warm,
      # but independently so type errors always surface even when
      # Next.js 16 defers them via Turbopack incremental mode.
      - name: TypeScript type check (npx tsc --noEmit)
        run: npx tsc --noEmit

      # ── 9. Upload build artifacts (failure only) ─────────────
      #
      # Artifacts are uploaded ONLY when the job has failed.
      # On green runs the artifact step is skipped entirely,
      # saving storage quota and keeping the summary clean.
      # On failure the .next/ directory and build.log are
      # uploaded so the exact Turbopack trace and error output
      # is available for offline inspection.
      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-failure-${{ github.sha }}
          path: |
            bansari-commerce-pro/.next/
            bansari-commerce-pro/build.log
          retention-days: 7
          if-no-files-found: warn
